<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Crear Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0e;
            font-family: 'Poppins', sans-serif;
            color: #f3f4f6;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .form-container {
            max-width: 600px;
            width: 100%;
            background: #0f1219;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin: auto;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; background: linear-gradient(90deg, #fff, #9ca3af); -webkit-background-clip: text; color: transparent; }
        p { color: #9ca3af; margin-bottom: 30px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; margin-top: 20px; }
        input, textarea {
            width: 100%;
            background: #111824;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            font-family: 'Poppins', sans-serif;
            color: white;
            font-size: 1rem;
            resize: vertical;
        }
        input:focus, textarea:focus { outline: none; border-color: #0ea5e9; }
        button {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px 30px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        .mensaje {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .exito { background: rgba(34,197,94,0.2); border: 1px solid #22c55e; color: #4ade80; }
        .error { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; color: #f87171; }
        hr { border-color: rgba(255,255,255,0.05); margin: 40px 0; }

        /* --- NUEVOS ESTILOS PARA LA LISTA DE POSTS --- */
        .gestion-posts h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #f3f4f6;
        }
        .post-item {
            background: #111824;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .post-info {
            flex: 1;
            overflow: hidden;
        }
        .post-info h4 {
            font-size: 1rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .post-info p {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-eliminar {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            width: auto;
            margin-top: 0;
            cursor: pointer;
        }
        .btn-eliminar:hover:not(:disabled) {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>➕ Nuevo Post</h1>
        <p>Agrega un lanzamiento a la página principal <strong>profilebio.me</strong></p>

        <form id="formPost">
            <label>Título del post:</label>
            <input type="text" id="titulo" placeholder="Ej: Mi nuevo video" required>

            <label>Código HTML (Imagen, video o iframe):</label>
            <textarea id="codigoHtml" rows="3" placeholder='Ej: <img src="..." alt="..."> o <iframe src="..."></iframe>' required></textarea>

            <label>Descripción:</label>
            <textarea id="descripcion" rows="4" placeholder="Describe el contenido del post..." required></textarea>

            <button id="btnSubmit" type="submit">PUBLICAR POST</button>
        </form>

        <div id="mensajeRespuesta" class="mensaje"></div>

        <hr>

        <div class="gestion-posts">
            <h2>🗑️ Gestionar Posts</h2>
            <div id="listaPosts">
                <p style="text-align: center; color: #9ca3af;">Cargando posts publicados...</p>
            </div>
        </div>

    </div>

    <script>
        const BIN_ID = '69d00038856a682189f88f1b';
        const API_KEY = '$2a$10$QzNa.Zj4OfVuzJpLx92t4eNgS1Yh/6UU5nsFuyXJKyxrkh8swx8IC';
        const API_BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        const form = document.getElementById('formPost');
        const mensajeDiv = document.getElementById('mensajeRespuesta');
        const btnSubmit = document.getElementById('btnSubmit');
        
        let postsGlobales = []; // Variable para almacenar los posts actuales

        // EVENTO: CREAR POST
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            mensajeDiv.style.display = 'none';
            mensajeDiv.className = 'mensaje';

            const titulo = document.getElementById('titulo').value.trim();
            const codigoHtml = document.getElementById('codigoHtml').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();

            if (!titulo || !codigoHtml || !descripcion) {
                mostrarMensaje('Todos los campos son obligatorios', 'error');
                return;
            }

            if (!codigoHtml.startsWith('<') || !codigoHtml.includes('>')) {
                mostrarMensaje('❌ Error: Debes ingresar un código HTML válido (ej: <img src="...">).', 'error');
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.textContent = '⏳ Publicando...';

            try {
                // Agregar al inicio del array global
                const nuevoPost = { titulo, imagen: codigoHtml, descripcion };
                postsGlobales.unshift(nuevoPost);

                // Actualizar servidor
                const actualizar = await fetch(API_BIN_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(postsGlobales)
                });

                if (!actualizar.ok) throw new Error('Error al guardar en el servidor');

                mostrarMensaje('✅ ¡Post creado exitosamente!', 'exito');
                form.reset();
                renderizarListaPosts(); // Actualizar la lista visualmente
            } catch (error) {
                console.error(error);
                mostrarMensaje('❌ Error: ' + error.message, 'error');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.textContent = 'PUBLICAR POST';
            }
        });

        // NUEVA FUNCIÓN: CARGAR POSTS DESDE EL SERVIDOR
        async function cargarListaPosts() {
            try {
                const respuesta = await fetch(API_BIN_URL, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                if (!respuesta.ok) throw new Error('No se pudo leer la base de datos');
                
                const datos = await respuesta.json();
                postsGlobales = datos.record || [];
                renderizarListaPosts();
            } catch (error) {
                document.getElementById('listaPosts').innerHTML = '<p style="color: #ef4444; text-align:center;">Error al cargar los posts.</p>';
            }
        }

        // NUEVA FUNCIÓN: DIBUJAR LOS POSTS EN PANTALLA
        function renderizarListaPosts() {
            const contenedor = document.getElementById('listaPosts');
            
            if (postsGlobales.length === 0) {
                contenedor.innerHTML = '<p style="text-align: center; color: #9ca3af;">No hay posts publicados todavía.</p>';
                return;
            }

            contenedor.innerHTML = '';
            postsGlobales.forEach((post, index) => {
                const item = document.createElement('div');
                item.className = 'post-item';
                item.innerHTML = `
                    <div class="post-info">
                        <h4>${escapeHtmlUI(post.titulo)}</h4>
                        <p>${escapeHtmlUI(post.descripcion)}</p>
                    </div>
                    <button class="btn-eliminar" onclick="eliminarPost(${index}, this)">Eliminar</button>
                `;
                contenedor.appendChild(item);
            });
        }

        // NUEVA FUNCIÓN: ELIMINAR POST
        async function eliminarPost(index, btnElement) {
            const confirmar = confirm('¿Estás seguro de que deseas eliminar este post? Esta acción no se puede deshacer.');
            if (!confirmar) return;

            btnElement.disabled = true;
            btnElement.textContent = '⏳...';

            try {
                // Clonar array y remover el elemento
                const nuevosPosts = [...postsGlobales];
                nuevosPosts.splice(index, 1);

                // Enviar nueva lista al servidor
                const actualizar = await fetch(API_BIN_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(nuevosPosts)
                });

                if (!actualizar.ok) throw new Error('Error al actualizar el servidor');

                // Si tiene éxito, actualizar variable global y re-dibujar
                postsGlobales = nuevosPosts;
                renderizarListaPosts();
                mostrarMensaje('🗑️ Post eliminado correctamente.', 'exito');

            } catch (error) {
                console.error(error);
                mostrarMensaje('❌ Error al eliminar el post.', 'error');
                btnElement.disabled = false;
                btnElement.textContent = 'Eliminar';
            }
        }

        function mostrarMensaje(texto, tipo) {
            mensajeDiv.textContent = texto;
            mensajeDiv.classList.add(tipo);
            mensajeDiv.style.display = 'block';
            setTimeout(() => {
                mensajeDiv.style.display = 'none';
                mensajeDiv.classList.remove(tipo);
            }, 5000);
        }

        // Utilidad para evitar inyección de código en los títulos de la lista
        function escapeHtmlUI(texto) {
            const div = document.createElement('div');
            div.textContent = texto;
            return div.innerHTML;
        }

        // Iniciar cargando la lista
        cargarListaPosts();
    </script>
</body>
</html>
