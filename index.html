<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Crear Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0e;
            font-family: 'Poppins', sans-serif;
            color: #f3f4f6;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .form-container {
            max-width: 800px;
            width: 100%;
            background: #0f1219;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin: auto;
        }
        h1 { font-size: 1.8rem; margin-bottom: 10px; background: linear-gradient(90deg, #fff, #9ca3af); -webkit-background-clip: text; color: transparent; }
        p { color: #9ca3af; margin-bottom: 30px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; margin-top: 20px; }
        input, textarea {
            width: 100%;
            background: #111824;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 16px;
            font-family: 'Poppins', sans-serif;
            color: white;
            font-size: 1rem;
            resize: vertical;
        }
        input:focus, textarea:focus { outline: none; border-color: #0ea5e9; }
        button {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 14px 30px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-secundario {
            background: rgba(255,255,255,0.05);
            margin-top: 10px;
        }
        .mensaje {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        .exito { background: rgba(34,197,94,0.2); border: 1px solid #22c55e; color: #4ade80; }
        .error { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; color: #f87171; }
        hr { border-color: rgba(255,255,255,0.05); margin: 40px 0; }
        
        /* Vista previa */
        .vista-previa {
            margin-top: 30px;
            padding: 20px;
            background: #05070c;
            border-radius: 20px;
            border: 1px dashed rgba(14,165,233,0.3);
        }
        .vista-previa h3 {
            font-size: 1rem;
            color: #0ea5e9;
            margin-bottom: 15px;
        }
        .preview-contenido {
            background: #0a0c12;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }
        .preview-contenido img, .preview-contenido iframe, .preview-contenido video {
            max-width: 100%;
            border-radius: 12px;
        }
        .preview-contenido iframe {
            aspect-ratio: 16/9;
            width: 100%;
        }

        /* Lista de posts */
        .gestion-posts h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #f3f4f6;
        }
        .post-item {
            background: #111824;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .post-info {
            flex: 1;
            overflow: hidden;
        }
        .post-info h4 {
            font-size: 1rem;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .post-info p {
            font-size: 0.85rem;
            color: #9ca3af;
            margin-bottom: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-eliminar {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            width: auto;
            margin-top: 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-eliminar:hover:not(:disabled) {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>➕ Nuevo Post</h1>
        <p>Agrega un lanzamiento a la página principal <strong>profilebio.me</strong></p>

        <form id="formPost">
            <label>Título del post:</label>
            <input type="text" id="titulo" placeholder="Ej: Mi nuevo video" required>

            <label>Código HTML (imagen, video o iframe):</label>
            <textarea id="codigoHtml" rows="3" placeholder='Ej: <img src="https://ejemplo.com/imagen.jpg"> o <iframe src="https://youtube.com/embed/..."></iframe>' required></textarea>

            <label>Descripción:</label>
            <textarea id="descripcion" rows="4" placeholder="Describe el contenido del post..." required></textarea>

            <button id="btnSubmit" type="submit">PUBLICAR POST</button>
            <button type="button" id="btnPrevisualizar" class="btn-secundario">👁️ Vista previa</button>
        </form>

        <div id="vistaPrevia" class="vista-previa" style="display: none;">
            <h3>🔍 Vista previa del post</h3>
            <div class="preview-contenido" id="previewHtml"></div>
        </div>

        <div id="mensajeRespuesta" class="mensaje"></div>

        <hr>

        <div class="gestion-posts">
            <h2>🗑️ Gestionar Posts</h2>
            <div id="listaPosts">
                <p style="text-align: center; color: #9ca3af;">Cargando posts publicados...</p>
            </div>
        </div>
    </div>

    <script>
        // ⚙️ CONFIGURACIÓN EXACTA A LA TUYA
        const BIN_ID = '69d00038856a682189f88f1b';
        const API_KEY = '$2a$10$QzNa.Zj4OfVuzJpLx92t4eNgS1Yh/6UU5nsFuyXJKyxrkh8swx8IC';
        const API_BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        const form = document.getElementById('formPost');
        const mensajeDiv = document.getElementById('mensajeRespuesta');
        const btnSubmit = document.getElementById('btnSubmit');
        const btnPrevisualizar = document.getElementById('btnPrevisualizar');
        const vistaPreviaDiv = document.getElementById('vistaPrevia');
        const previewHtml = document.getElementById('previewHtml');
        
        let postsGlobales = [];

        // --- VISTA PREVIA EN TIEMPO REAL ---
        function actualizarVistaPrevia() {
            const codigo = document.getElementById('codigoHtml').value.trim();
            const titulo = document.getElementById('titulo').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();
            
            if (!codigo) {
                vistaPreviaDiv.style.display = 'none';
                return;
            }
            
            vistaPreviaDiv.style.display = 'block';
            let preview = '';
            if (titulo) preview += `<h4 style="color:white; margin-bottom:8px;">${escapeHtmlUI(titulo)}</h4>`;
            preview += `<div style="margin-bottom:12px;">${codigo}</div>`;
            if (descripcion) preview += `<p style="color:#9ca3af; font-size:0.85rem;">${escapeHtmlUI(descripcion)}</p>`;
            previewHtml.innerHTML = preview;
        }
        
        document.getElementById('codigoHtml').addEventListener('input', actualizarVistaPrevia);
        document.getElementById('titulo').addEventListener('input', actualizarVistaPrevia);
        document.getElementById('descripcion').addEventListener('input', actualizarVistaPrevia);
        
        btnPrevisualizar.addEventListener('click', () => {
            actualizarVistaPrevia();
            if (vistaPreviaDiv.style.display !== 'block' && document.getElementById('codigoHtml').value.trim()) {
                vistaPreviaDiv.style.display = 'block';
            }
        });

        // --- CREAR POST ---
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            mensajeDiv.style.display = 'none';
            mensajeDiv.className = 'mensaje';

            const titulo = document.getElementById('titulo').value.trim();
            const codigoHtml = document.getElementById('codigoHtml').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();

            if (!titulo || !codigoHtml || !descripcion) {
                mostrarMensaje('Todos los campos son obligatorios', 'error');
                return;
            }

            if (!codigoHtml.startsWith('<') || !codigoHtml.includes('>')) {
                mostrarMensaje('❌ Error: Debes ingresar un código HTML válido (ej: <img src="...">).', 'error');
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.textContent = '⏳ Publicando...';

            try {
                // Generar un ID único simple para futuras referencias (opcional pero buena práctica)
                const nuevoPost = { 
                    id: Date.now().toString(),
                    titulo: titulo, 
                    html: codigoHtml, 
                    descripcion: descripcion 
                };
                
                // Asegurarse de tener la versión más reciente antes de subir
                await cargarListaPosts(false); // Carga sin renderizar aún
                
                postsGlobales.unshift(nuevoPost); // Añadir al inicio

                const actualizar = await fetch(API_BIN_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY,
                        'X-Bin-Versioning': 'false' // Evita llenar el servidor de historial basura
                    },
                    body: JSON.stringify(postsGlobales)
                });

                if (!actualizar.ok) throw new Error('Error al guardar en el servidor');

                mostrarMensaje('✅ ¡Post creado exitosamente!', 'exito');
                form.reset();
                vistaPreviaDiv.style.display = 'none';
                renderizarListaPosts();
            } catch (error) {
                console.error(error);
                mostrarMensaje('❌ Error: ' + error.message, 'error');
                // Revertir array en caso de error
                postsGlobales.shift(); 
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.textContent = 'PUBLICAR POST';
            }
        });

        // --- CARGAR Y GESTIONAR POSTS ---
        async function cargarListaPosts(render = true) {
            try {
                const respuesta = await fetch(API_BIN_URL, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                if (!respuesta.ok) throw new Error('No se pudo leer la base de datos');
                
                const datos = await respuesta.json();
                postsGlobales = datos.record || [];
                
                if (render) renderizarListaPosts();
            } catch (error) {
                console.error(error);
                if (render) {
                    document.getElementById('listaPosts').innerHTML = '<p style="color: #ef4444; text-align:center;">Error al cargar los posts.</p>';
                }
            }
        }

        function renderizarListaPosts() {
            const contenedor = document.getElementById('listaPosts');
            
            if (!postsGlobales || postsGlobales.length === 0) {
                contenedor.innerHTML = '<p style="text-align: center; color: #9ca3af;">No hay posts publicados todavía.</p>';
                return;
            }

            contenedor.innerHTML = '';
            postsGlobales.forEach((post, index) => {
                const item = document.createElement('div');
                item.className = 'post-item';
                item.innerHTML = `
                    <div class="post-info">
                        <h4>${escapeHtmlUI(post.titulo)}</h4>
                        <p>${escapeHtmlUI(post.descripcion)}</p>
                    </div>
                    <button class="btn-eliminar" data-index="${index}">Eliminar</button>
                `;
                contenedor.appendChild(item);
            });

            // Asignar eventos a los botones eliminar
            document.querySelectorAll('.btn-eliminar').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    await eliminarPost(idx, btn);
                });
            });
        }

        async function eliminarPost(index, btnElement) {
            const confirmar = confirm('¿Estás seguro de que deseas eliminar este post?');
            if (!confirmar) return;

            btnElement.disabled = true;
            btnElement.textContent = '⏳ Borrando...';

            try {
                // Asegurarse de tener la data más reciente
                await cargarListaPosts(false);
                
                const nuevosPosts = [...postsGlobales];
                nuevosPosts.splice(index, 1); // Quitar el post

                const actualizar = await fetch(API_BIN_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY,
                        'X-Bin-Versioning': 'false' // Evitar historial basura
                    },
                    body: JSON.stringify(nuevosPosts)
                });

                if (!actualizar.ok) throw new Error('Error al actualizar la base de datos');

                postsGlobales = nuevosPosts;
                renderizarListaPosts();
                mostrarMensaje('🗑️ Post eliminado correctamente.', 'exito');
            } catch (error) {
                console.error(error);
                mostrarMensaje('❌ Error al eliminar el post.', 'error');
                btnElement.disabled = false;
                btnElement.textContent = 'Eliminar';
            }
        }

        // --- UTILIDADES ---
        function mostrarMensaje(texto, tipo) {
            mensajeDiv.textContent = texto;
            mensajeDiv.className = `mensaje ${tipo}`;
            mensajeDiv.style.display = 'block';
            setTimeout(() => {
                mensajeDiv.style.display = 'none';
                mensajeDiv.className = 'mensaje';
            }, 5000);
        }

        function escapeHtmlUI(texto) {
            if (!texto) return '';
            const div = document.createElement('div');
            div.textContent = texto;
            return div.innerHTML;
        }

        // Iniciar
        cargarListaPosts();
    </script>
</body>
</html>
